phases:
  - id: "phase_a"
    title: "Phase A - Product Credibility Foundation"
    objective: "De productbasis moet inhoudelijk kloppen, live werken en geloofwaardig genoeg zijn om commercieel op voort te bouwen."
    items:
      - "EXITSCAN_PLANMODE_PRODUCT_REVIEW_AND_TEST_PROMPT.md"
      - "EXITSCAN_PLANMODE_LIVE_TEST_PROMPT.md"
      - "RETENTIESCAN_PLANMODE_PRODUCT_REVIEW_AND_TEST_PROMPT.md"
      - "RETENTIESCAN_PLANMODE_LIVE_TEST_PROMPT.md"
      - "RETENTIESCAN_PLANMODE_PRODUCT_SHARPENING_PROMPT.md"
      - "DASHBOARD_DECISION_SUPPORT_PROGRAM_PLANMODE_PROMPT.md"
      - "RETENTIESCAN_V1_1_VALIDATION_PLANMODE_PROMPT.md"
      - "REPORTING_SYSTEM_SHARPENING_PLANMODE_PROMPT.md"
      - "REPORT_VISUAL_AND_COMMERCIAL_UPLIFT_PROGRAM_PLANMODE_PROMPT.md"
    exit_gate:
      - "Claims sluiten aan op de methodiek"
      - "Kernflows werken live"
      - "Rapport en dashboard zijn professioneel genoeg als managementinstrument"
    waits_until_later:
      - "Grote SEO-inzet"
      - "Grootschalige websitepolish los van inhoud"
      - "Portfolio-uitbreiding"
  - id: "phase_b"
    title: "Phase B - Decision-Maker Readiness"
    objective: "Verisight moet overtuigend landen bij HR-beslissers, directie en eerste kopers zonder dat betekenis of geloofwaardigheid verloren gaat."
    items:
      - "MANAGEMENT_ACTIONABILITY_PROGRAM_PLANMODE_PROMPT.md"
      - "METHOD_AND_TRUST_SYSTEM_PLANMODE_PROMPT.md"
      - "TRUST_SIGNAL_PROGRAM_PLANMODE_PROMPT.md"
      - "BOARDROOM_READINESS_PROGRAM_PLANMODE_PROMPT.md"
      - "FOUNDER_LED_SALES_NARRATIVE_PROGRAM_PLANMODE_PROMPT.md"
    exit_gate:
      - "HR en directie begrijpen sneller wat het product oplevert"
      - "Trust- en claimsgrenzen zijn helder"
      - "Het verhaal is overtuigend zonder te overclaimen"
    waits_until_later:
      - "Website-redesign als hoofdproject"
      - "SEO-conversieschaal"
      - "Bredere contentmachine"
  - id: "phase_c"
    title: "Phase C - Commercial Packaging"
    objective: "De propositie, verpakking en ondersteunende assets moeten coherent genoeg zijn om verkoopbaar en herhaalbaar te worden."
    items:
      - "PRODUCT_TERMINOLOGY_AND_TAXONOMY_SYSTEM_PLANMODE_PROMPT.md"
      - "SALES_ENABLEMENT_SYSTEM_PLANMODE_PROMPT.md"
      - "PRICING_AND_PACKAGING_PROGRAM_PLANMODE_PROMPT.md"
      - "SAMPLE_OUTPUT_AND_SHOWCASE_PROGRAM_PLANMODE_PROMPT.md"
    exit_gate:
      - "Producttaal is consistent"
      - "Pricing en packaging zijn begrijpelijk"
      - "Voorbeeldoutput en salesmateriaal ondersteunen hetzelfde verhaal"
    waits_until_later:
      - "Website-optimalisatie op schaal"
      - "SEO-programma"
  - id: "phase_d"
    title: "Phase D - Website And Funnel System"
    objective: "De website en funnel moeten de aangescherpte propositie, trustlaag en voorbeeldoutput helder en commercieel overbrengen."
    items:
      - "WEBSITE_REDESIGN_AND_FLOW_PLANMODE_PROMPT.md"
      - "CUSTOMER_JOURNEY_AND_FUNNEL_ALIGNMENT_PLANMODE_PROMPT.md"
      - "SEO_CONVERSION_PROGRAM_PLANMODE_PROMPT.md"
    exit_gate:
      - "Website weerspiegelt de aangescherpte product- en trustlaag"
      - "De funnel volgt een duidelijke route van interesse naar gesprek"
      - "SEO en conversie worden geoptimaliseerd op stabiele messaging"
    waits_until_later:
      - "Brede content-operating-systemen"
      - "Schaalmarketing zonder eerste commerciële bevestiging"
  - id: "phase_e"
    title: "Phase E - Delivery And Adoption System"
    objective: "Eerste klanten moeten soepel van akkoord naar intake, campagne, rapportage en opvolging kunnen gaan."
    items:
      - "CLIENT_ONBOARDING_AND_ADOPTION_PROGRAM_PLANMODE_PROMPT.md"
      - "IMPLEMENTATION_READINESS_PROGRAM_PLANMODE_PROMPT.md"
      - "REPORT_TO_ACTION_PROGRAM_PLANMODE_PROMPT.md"
      - "PILOT_AND_EARLY_CUSTOMER_LEARNING_SYSTEM_PLANMODE_PROMPT.md"
      - "DEMO_AND_SAMPLE_ENVIRONMENT_PROGRAM_PLANMODE_PROMPT.md"
    exit_gate:
      - "Nieuwe klanttrajecten zijn uitvoerbaar zonder onnodige improvisatie"
      - "Rapporten leiden tot opvolging en leerloops"
      - "Demo en pilotassets zijn schaalbaar genoeg voor hergebruik"
    waits_until_later:
      - "Zware self-service uitbreiding"
      - "Grote ops-automatisering"
  - id: "phase_f"
    title: "Phase F - Scale And Operating System"
    objective: "Na eerste tractie moeten commerciële, delivery- en contentprocessen herhaalbaar en schaalbaar worden gemaakt."
    items:
      - "ASSISTED_TO_SAAS_READINESS_PROGRAM_PLANMODE_PROMPT.md"
      - "CUSTOMER_LIFECYCLE_AND_EXPANSION_MODEL_PLANMODE_PROMPT.md"
      - "ACCOUNT_AND_BILLING_MODEL_READINESS_PLANMODE_PROMPT.md"
      - "OPS_AND_DELIVERY_SYSTEM_PLANMODE_PROMPT.md"
      - "CASE_PROOF_AND_EVIDENCE_PROGRAM_PLANMODE_PROMPT.md"
      - "PORTFOLIO_ARCHITECTURE_PROGRAM_PLANMODE_PROMPT.md"
      - "CONTENT_OPERATING_SYSTEM_PLANMODE_PROMPT.md"
    exit_gate:
      - "Herhaalbaar verkoop- en deliveryritme"
      - "Eerste geloofwaardig bewijs en cases"
      - "Portfolio en contentlogica zonder productverwarring"
    waits_until_later: []
