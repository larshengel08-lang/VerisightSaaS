<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background:#f3f6fb;font-family:'Inter',Arial,sans-serif;color:#0D1B2A;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f3f6fb;padding:40px 20px;">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #dbe4f0;border-radius:18px;overflow:hidden;">
        <tr>
          <td style="padding:24px 32px;border-bottom:1px solid #e5edf6;">
            <div style="font-size:20px;font-weight:800;letter-spacing:-0.04em;color:#0D1B2A;">Loep <span style="color:#E8A020;">&bull;</span></div>
            <div style="margin-top:5px;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#64748b;">Scherper zien wat telt</div>
          </td>
        </tr>
        <tr>
          <td style="padding:32px;">
            <p style="font-size:13px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;">Nieuwe response ontvangen</p>
            <h1 style="font-size:20px;font-weight:700;color:#0D1B2A;margin:0 0 20px;">
              {campaign_name}
            </h1>

            <table cellpadding="0" cellspacing="0" style="width:100%;margin:0 0 24px;">
              <tr>
                <td style="background:rgba(232,160,32,0.12);border-radius:8px;padding:16px 20px;">
                  <span style="font-size:24px;font-weight:700;color:#0D1B2A;">{total_completed}</span>
                  <span style="font-size:13px;color:#0D1B2A;"> van {total_invited} ingevuld ({completion_pct}%)</span>
                </td>
              </tr>
            </table>

            <table cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
              <tr>
                <td style="background:#0D1B2A;border-radius:12px;">
                  <a href="{dashboard_url}"
                     style="display:inline-block;padding:12px 28px;color:#FFFFFF;font-size:14px;font-weight:600;text-decoration:none;">
                    Bekijk dashboard &rarr;
                  </a>
                </td>
              </tr>
            </table>

            <p style="font-size:12px;color:#94a3b8;margin:0;">
              Je ontvangt deze notificatie omdat je beheerder bent van deze campaign in Loep.
            </p>
          </td>
        </tr>
        <tr>
          <td style="background:#f8fbff;padding:16px 32px;border-top:1px solid #e5edf6;">
            <p style="font-size:11px;color:#94a3b8;margin:0;">Loep &bull; Scherper zien wat telt</p>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
