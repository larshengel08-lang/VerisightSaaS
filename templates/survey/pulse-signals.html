{% if scan_type == "pulse" or scan_type == "team" %}
<p style="font-weight:600;font-size:14px;margin-bottom:8px;color:var(--text);">{{ scan.stay_section_title or "Richting nu" }}</p>
<p style="color:var(--muted);font-size:13px;margin-bottom:16px;">{{ scan.stay_intro }}</p>
<div class="question-block" id="qblock-local-stay">
  <div class="question-text"><span class="question-number">◆</span>{{ scan.stay_item[1] }}</div>
  <div class="likert-wrap">
    <div class="likert-labels"><span>Helemaal niet mee eens</span><span>Helemaal mee eens</span></div>
    <div class="likert-options">
      {% for i in range(1, 6) %}
      <div class="likert-option">
        <input type="radio" name="stay_intent_score" id="{{ scan_type }}_stay_{{ i }}" value="{{ i }}" required />
        <label for="{{ scan_type }}_stay_{{ i }}">{{ i }}</label>
      </div>
      {% endfor %}
    </div>
  </div>
  <div class="field-error">Selecteer een antwoord.</div>
</div>
{% endif %}
