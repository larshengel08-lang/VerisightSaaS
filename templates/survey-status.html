<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} — Loep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D1B2A;
      --amber: #E8A020;
      --amber-deep: #B07A10;
      --text: #0D1B2A;
      --muted: #4A6070;
      --border: rgba(13,27,42,0.15);
      --bg: #F4F1EA;
      --white: #FFFFFF;
      --info-bg: rgba(13,27,42,0.06);
      --info-text: #0D1B2A;
      --warning-bg: rgba(232,160,32,0.18);
      --warning-text: #B07A10;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(13,27,42,.08);
    }
    .logo {
      font-family: 'Inter Tight', 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -.04em;
    }
    .logo .dot { color: var(--amber); }
    .payoff {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 6px 0 28px;
    }
    .icon-wrap {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 34px;
      font-weight: 700;
    }
    .icon-wrap.info {
      background: var(--info-bg);
      color: var(--info-text);
    }
    .icon-wrap.warning {
      background: var(--warning-bg);
      color: var(--warning-text);
    }
    h1 {
      font-family: 'Inter Tight', 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 14px;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }
    .hint {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Loep <span class="dot">&bull;</span></div>
    <div class="payoff">Scherper zien wat telt</div>
    <div class="icon-wrap {{ tone }}">{{ "!" if tone == "warning" else "i" }}</div>
    <h1>{{ heading }}</h1>
    <p>{{ message }}</p>
    {% if hint %}
    <p class="hint">{{ hint }}</p>
    {% endif %}
  </div>
</body>
</html>
