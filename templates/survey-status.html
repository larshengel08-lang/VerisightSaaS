<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} — Verisight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #2563EB;
      --text: #111827;
      --muted: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
      --white: #FFFFFF;
      --info-bg: #DBEAFE;
      --info-text: #1D4ED8;
      --warning-bg: #FEF3C7;
      --warning-text: #B45309;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: -.5px;
      margin-bottom: 28px;
    }
    .icon-wrap {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 34px;
      font-weight: 700;
    }
    .icon-wrap.info {
      background: var(--info-bg);
      color: var(--info-text);
    }
    .icon-wrap.warning {
      background: var(--warning-bg);
      color: var(--warning-text);
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }
    .hint {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Verisight</div>
    <div class="icon-wrap {{ tone }}">{{ "!" if tone == "warning" else "i" }}</div>
    <h1>{{ heading }}</h1>
    <p>{{ message }}</p>
    {% if hint %}
    <p class="hint">{{ hint }}</p>
    {% endif %}
  </div>
</body>
</html>
