<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verisight — De Rapporteur [Preview]</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: oklch(0.978 0.012 62);
  color: oklch(0.14 0.008 50);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Keyframes ── */
@keyframes slideUpFade {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideDownFade {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideRightFade {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes scaleXIn {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes floatY {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-8px); }
}
@keyframes marqueeScroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
@keyframes gradFlow {
  0%, 100% { background-position: 0% 50%; }
  50%       { background-position: 100% 50%; }
}
@keyframes ctaPulse {
  0%, 100% { opacity: 0.55; transform: scale(1); }
  50%       { opacity: 0.85; transform: scale(1.04); }
}
@keyframes barGrow {
  from { height: 0; }
  to   { height: var(--bar-h); }
}
@keyframes progressFill {
  from { width: 0%; }
}
@keyframes borderPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  50%       { box-shadow: 0 0 0 8px rgba(255,255,255,0.06); }
}

/* ── Hero entrance cascade ── */
.h-sm   { animation: slideDownFade 0.6s cubic-bezier(0.16,1,0.3,1) 0.05s both; }
.h-1    { animation: slideUpFade   0.9s cubic-bezier(0.16,1,0.3,1) 0.15s both; }
.h-2    { animation: slideUpFade   0.9s cubic-bezier(0.16,1,0.3,1) 0.28s both; }
.h-rule { animation: scaleXIn     0.7s cubic-bezier(0.4,0,0,1)    0.52s both; transform-origin: left; }
.h-body { animation: slideUpFade  0.8s cubic-bezier(0.16,1,0.3,1) 0.60s both; }
.h-cta  { animation: slideUpFade  0.8s cubic-bezier(0.16,1,0.3,1) 0.72s both; }
.h-trust{ animation: fadeIn       0.8s ease                        0.88s both; }
.h-dash { animation: slideRightFade 1.0s cubic-bezier(0.16,1,0.3,1) 0.22s both; }

/* ── Shimmer text for accent italic ── */
.shimmer-text {
  background: linear-gradient(90deg, var(--ac-deep) 20%, var(--ac-light) 50%, var(--ac-deep) 80%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 4s linear infinite;
}

/* ── Float animation for dashboard ── */
.float-anim { animation: floatY 6s ease-in-out infinite; }

/* ── Scroll progress bar ── */
#scroll-progress {
  position: fixed; top: 0; left: 0; right: 0;
  height: 2px; z-index: 300; pointer-events: none;
}
#scroll-progress-bar {
  height: 100%;
  background: var(--ac-mid);
  transition: width 0.08s linear;
}

/* ── Marquee mask ── */
.marquee-wrap {
  -webkit-mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
  mask-image:         linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
}

/* ── Animated underline for links ── */
.link-underline {
  position: relative;
  text-decoration: none;
}
.link-underline::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0;
  width: 0; height: 1px;
  background: currentColor;
  transition: width 0.22s cubic-bezier(0.4,0,0,1);
}
.link-underline:hover::after { width: 100%; }

/* ── Route card hover strip ── */
.route-strip {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  transform-origin: left;
  transform: scaleX(0);
  transition: transform 0.3s cubic-bezier(0.4,0,0,1);
}
.route-card:hover .route-strip { transform: scaleX(1); }

/* ── CTA button glow ── */
.cta-btn-primary { animation: borderPulse 2.5s ease-in-out 1s infinite; }
</style>
</head>
<body>

<div id="scroll-progress"><div id="scroll-progress-bar" style="width:0%"></div></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{ "accentHue": 52 }/*EDITMODE-END*/;

/* ── Tokens ── */
const T = {
  paper:     'oklch(0.978 0.012 62)',
  paperSoft: 'oklch(0.956 0.020 60)',
  white:     '#FFFCF8',
  ink:       'oklch(0.14 0.008 50)',
  inkSoft:   'oklch(0.30 0.008 50)',
  inkMuted:  'oklch(0.52 0.008 50)',
  inkFaint:  'oklch(0.70 0.006 50)',
  rule:      'oklch(0.875 0.016 62)',
  ruleLight: 'oklch(0.918 0.010 62)',
};

function ac(hue) {
  return {
    deep:  `oklch(0.42 0.18  ${hue})`,
    mid:   `oklch(0.78 0.133 ${hue + 3})`,
    light: `oklch(0.88 0.09  ${hue + 5})`,
    soft:  `oklch(0.95 0.055 ${hue})`,
    faint: `oklch(0.976 0.022 ${hue})`,
  };
}

/* ── Scroll progress (vanilla DOM, zero re-renders) ── */
function mountScrollProgress() {
  const bar = document.getElementById('scroll-progress-bar');
  if (!bar) return;
  const fn = () => {
    const s = window.scrollY;
    const h = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (h > 0 ? (s / h) * 100 : 0) + '%';
  };
  window.addEventListener('scroll', fn, { passive: true });
  return () => window.removeEventListener('scroll', fn);
}

/* ── useInView ── */
function useInView(threshold = 0.12) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, inView];
}

/* ── useCountUp ── */
function useCountUp(target, inView, duration = 1100) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!inView) return;
    let raf, start;
    raf = requestAnimationFrame(function step(ts) {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      const e = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(e * target));
      if (p < 1) raf = requestAnimationFrame(step);
    });
    return () => cancelAnimationFrame(raf);
  }, [inView, target, duration]);
  return val;
}

/* ── Reveal wrapper (scroll-triggered) ── */
function Reveal({ children, delay = 0, from = 'up', threshold = 0.1 }) {
  const [ref, inView] = useInView(threshold);
  const transforms = { up: 'translateY(22px)', right: 'translateX(24px)', none: 'none' };
  return (
    <div ref={ref} style={{
      opacity:    inView ? 1 : 0,
      transform:  inView ? 'none' : transforms[from],
      transition: `opacity 0.75s ease ${delay}s, transform 0.75s cubic-bezier(0.16,1,0.3,1) ${delay}s`,
      willChange: 'transform, opacity',
    }}>
      {children}
    </div>
  );
}

/* ── Section mark ── */
function SectionMark({ num, label, inView = true }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 52 }}>
      <span style={{ fontFamily: "'Fraunces', serif", fontSize: 11, fontWeight: 400, color: T.inkFaint, letterSpacing: '0.03em', minWidth: 18 }}>{num}</span>
      <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.18em', textTransform: 'uppercase', color: T.inkMuted, whiteSpace: 'nowrap' }}>{label}</span>
      <div style={{
        flex: 1, height: '1px', background: T.rule, transformOrigin: 'left',
        transform: inView ? 'scaleX(1)' : 'scaleX(0)',
        opacity:   inView ? 1 : 0,
        transition: 'transform 0.9s cubic-bezier(0.4,0,0,1) 0.1s, opacity 0.4s ease 0.1s',
      }} />
    </div>
  );
}

/* ── Arrow ── */
function Arrow() {
  return <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
    <path d="M2.5 7h9M7.5 3.5L11 7l-3.5 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

/* ── Buttons ── */
function PrimaryBtn({ accent, children, large, ghost, glowPulse }) {
  const [hov, setHov] = useState(false);
  const base = {
    textDecoration: 'none', display: 'inline-flex', alignItems: 'center',
    gap: 7, cursor: 'pointer',
    fontSize: large ? 14.5 : 13, fontWeight: ghost ? 500 : 600,
    padding: large ? '12px 28px' : '7px 16px',
    transition: 'all 0.18s cubic-bezier(0.4,0,0,1)',
  };
  if (ghost) return (
    <a href="#" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ ...base, color: hov ? T.ink : T.inkSoft,
        border: `1px solid ${hov ? T.inkMuted : T.rule}`,
        background: hov ? T.paperSoft : 'transparent',
        transform: hov ? 'translateY(-1px)' : 'none',
      }}>
      {children}
    </a>
  );
  return (
    <a href="#" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      className={glowPulse ? 'cta-btn-primary' : ''}
      style={{ ...base, color: '#fff',
        background: hov ? accent.deep : T.ink,
        transform: hov ? 'translateY(-2px)' : 'none',
        boxShadow: hov ? `0 8px 24px -4px ${accent.deep}55` : 'none',
      }}>
      {children}<Arrow />
    </a>
  );
}

/* ── Nav ── */
function Nav({ accent }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 10);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{
      position: 'sticky', top: 0, zIndex: 200,
      background: scrolled ? 'rgba(250,249,246,0.92)' : T.white,
      backdropFilter: scrolled ? 'blur(20px) saturate(150%)' : 'none',
      borderBottom: `1px solid ${scrolled ? T.rule : T.ruleLight}`,
      transition: 'all 0.3s ease',
    }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 48px', height: 60, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 32 }}>
        <a href="#" style={{ display: 'flex', alignItems: 'center', gap: 8, textDecoration: 'none', flexShrink: 0 }}>
          <span style={{ fontFamily: "'Fraunces', serif", fontSize: 9, color: accent.mid, lineHeight: 1, position: 'relative', top: -1 }}>◆</span>
          <span style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 400, color: T.ink, letterSpacing: '-0.02em' }}>Verisight</span>
        </a>
        <div style={{ display: 'flex', alignItems: 'center' }}>
          {['Producten', 'Aanpak', 'Tarieven', 'Vertrouwen'].map(l => <NavLink key={l} label={l} />)}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
          <a href="#" className="link-underline" style={{ fontSize: 13, fontWeight: 500, color: T.inkMuted, textDecoration: 'none', padding: '7px 14px', transition: 'color 0.15s' }}
            onMouseEnter={e => e.target.style.color = T.ink}
            onMouseLeave={e => e.target.style.color = T.inkMuted}>
            Inloggen
          </a>
          <PrimaryBtn accent={accent}>Plan een kennismaking</PrimaryBtn>
        </div>
      </div>
    </nav>
  );
}

function NavLink({ label }) {
  const [hov, setHov] = useState(false);
  return (
    <a href="#" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ fontSize: 13.5, color: hov ? T.ink : T.inkMuted, textDecoration: 'none', padding: '7px 13px', transition: 'color 0.15s', position: 'relative' }}>
      {label}
      <span style={{
        position: 'absolute', bottom: 2, left: '50%', transform: 'translateX(-50%)',
        width: hov ? 14 : 0, height: 2, background: T.ink, borderRadius: 1,
        transition: 'width 0.2s cubic-bezier(0.4,0,0,1)',
      }} />
    </a>
  );
}

/* ── Hero ── */
function Hero({ accent }) {
  const [tab, setTab] = useState('samenvatting');

  return (
    <section style={{
      background: T.white, padding: '72px 0 80px',
      borderBottom: `1px solid ${T.rule}`, position: 'relative', overflow: 'hidden',
    }}>
      {/* Subtle blueprint grid */}
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 0,
        backgroundImage: `linear-gradient(${T.rule}88 1px, transparent 1px), linear-gradient(90deg, ${T.rule}88 1px, transparent 1px)`,
        backgroundSize: '72px 72px',
        opacity: 0.45,
      }} />
      {/* Animated radial glow top-right */}
      <div style={{
        position: 'absolute', top: -120, right: -80, width: 600, height: 600,
        background: `radial-gradient(circle, ${accent.soft} 0%, transparent 65%)`,
        pointerEvents: 'none', zIndex: 0,
        animation: 'ctaPulse 6s ease-in-out infinite',
      }} />

      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 48px', position: 'relative', zIndex: 1 }}>
        {/* Section mark — always visible in hero */}
        <div className="h-sm">
          <SectionMark num="01" label="People insight · HR & management" inView={true} />
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 572px', gap: 80, alignItems: 'start' }}>
          <div>
            {/* Headline — split into two Reveal lines */}
            <div className="h-1">
              <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 400, fontSize: 88, lineHeight: 0.95, letterSpacing: '-0.034em', color: T.ink, textWrap: 'balance' }}>
                Van losse<br />signalen
              </div>
            </div>
            <div className="h-2" style={{ marginBottom: 28 }}>
              <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 300, fontSize: 88, lineHeight: 0.95, letterSpacing: '-0.034em', textWrap: 'balance' }}>
                <em className="shimmer-text" style={{ fontStyle: 'italic' }}>naar een eerste<br />helder beeld.</em>
              </div>
            </div>

            <div className="h-rule" style={{ width: 40, height: 3, background: accent.deep, marginBottom: 28, display: 'block' }} />

            <div className="h-body">
              <p style={{ fontSize: 16.5, lineHeight: 1.72, color: T.inkSoft, maxWidth: '46ch', marginBottom: 36 }}>
                Verisight helpt HR en MT sneller zien waar vertrek, behoud en vroege medewerkerservaring aandacht vragen. Gegroepeerde output die direct bruikbaar is voor gesprek en prioritering.
              </p>
            </div>

            <div className="h-cta" style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
              <PrimaryBtn accent={accent} large>Plan een kennismaking</PrimaryBtn>
              <PrimaryBtn accent={accent} large ghost>Bekijk voorbeeldoutput</PrimaryBtn>
            </div>

            <div className="h-trust" style={{ marginTop: 44, paddingTop: 28, borderTop: `1px solid ${T.rule}`, display: 'flex', alignItems: 'center', gap: 28, flexWrap: 'wrap' }}>
              {[
                { icon: 'shield', label: 'Geen individuele data' },
                { icon: 'lock',   label: 'AVG-conform' },
                { icon: 'clock',  label: 'Resultaat binnen weken' },
              ].map(p => <TrustPill key={p.label} icon={p.icon}>{p.label}</TrustPill>)}
            </div>
          </div>

          {/* Dashboard — floats gently */}
          <div className="h-dash float-anim">
            <DashboardPreview accent={accent} tab={tab} setTab={setTab} />
          </div>
        </div>
      </div>
    </section>
  );
}

function TrustPill({ icon, children }) {
  const paths = {
    shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" strokeWidth="1.5" fill="none"/>,
    lock:   <><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" strokeWidth="1.5" fill="none"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" strokeWidth="1.5" fill="none"/></>,
    clock:  <><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="1.5" fill="none"/><path d="M12 6v6l4 2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" fill="none"/></>,
  };
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 7, fontSize: 12, color: T.inkMuted }}>
      <svg width="13" height="13" viewBox="0 0 24 24">{paths[icon]}</svg>
      {children}
    </div>
  );
}

/* ── Dashboard Preview ── */
function DashboardPreview({ accent, tab, setTab }) {
  const tabs = [
    { id: 'samenvatting', label: 'Samenvatting' },
    { id: 'themas',       label: "Thema's" },
    { id: 'rapportage',   label: 'Rapportage' },
  ];
  return (
    <div style={{
      background: T.white, border: `1px solid ${T.rule}`, borderRadius: 14,
      overflow: 'hidden',
      boxShadow: `0 2px 4px rgba(0,0,0,.04), 0 32px 72px -16px rgba(20,18,12,.2), 0 0 0 1px ${accent.soft}`,
    }}>
      <div style={{ display: 'flex', gap: 2, padding: '10px 14px', background: T.paperSoft, borderBottom: `1px solid ${T.rule}` }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            fontSize: 12, fontWeight: t.id === tab ? 600 : 400,
            padding: '6px 14px', border: 'none', cursor: 'pointer', borderRadius: 5,
            background: t.id === tab ? T.white : 'transparent',
            color: t.id === tab ? T.ink : T.inkMuted,
            boxShadow: t.id === tab ? '0 1px 3px rgba(0,0,0,.08)' : 'none',
            transition: 'all 0.15s',
          }}>
            {t.label}
          </button>
        ))}
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6 }}>
          <div style={{ width: 6, height: 6, borderRadius: '50%', background: accent.mid, boxShadow: `0 0 0 3px ${accent.soft}` }} />
          <span style={{ fontSize: 10.5, color: T.inkMuted, fontWeight: 500 }}>ExitScan · Q2</span>
        </div>
      </div>
      <div style={{ padding: '26px 28px', animation: 'scaleIn 0.3s ease both' }} key={tab}>
        {tab === 'samenvatting' && <SamenvattingTab accent={accent} />}
        {tab === 'themas'       && <ThemasTab accent={accent} />}
        {tab === 'rapportage'   && <RapportageTab accent={accent} />}
      </div>
    </div>
  );
}

function SamenvattingTab({ accent }) {
  const [ready, setReady] = useState(false);
  useEffect(() => { const t = setTimeout(() => setReady(true), 120); return () => clearTimeout(t); }, []);

  return (
    <div>
      <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', color: T.inkMuted, marginBottom: 5 }}>Voorbeeldoutput · Q2 2025</div>
      <div style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 400, color: T.ink, marginBottom: 22, lineHeight: 1.25, letterSpacing: '-0.01em' }}>
        Managementsamenvatting. Topprioriteiten, trend en eerste actie.
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 7, marginBottom: 22 }}>
        {[
          { label: 'Groei en ontwikkeling', tag: 'Hoog',     tagBg: 'oklch(0.85 0.05 25 / 0.28)', tagColor: 'oklch(0.35 0.15 25)', delay: 0 },
          { label: 'Werkdruk in operatie',  tag: 'Verhoogd', tagBg: 'oklch(0.88 0.06 75 / 0.32)', tagColor: 'oklch(0.40 0.12 65)', delay: 0.07 },
          { label: 'Loopbaanperspectief',   tag: 'Aandacht', tagBg: accent.soft,                   tagColor: accent.deep,           delay: 0.14 },
        ].map((item, i) => (
          <div key={i} style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '10px 13px', background: T.paperSoft, fontSize: 13,
            opacity: ready ? 1 : 0, transform: ready ? 'none' : 'translateX(-8px)',
            transition: `opacity 0.5s ease ${item.delay}s, transform 0.5s cubic-bezier(0.16,1,0.3,1) ${item.delay}s`,
          }}>
            <span style={{ color: T.ink, fontWeight: 500 }}>{item.label}</span>
            <span style={{ fontSize: 9.5, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', padding: '2px 8px', background: item.tagBg, color: item.tagColor }}>{item.tag}</span>
          </div>
        ))}
      </div>

function TweaksApp({ tweaks, setTweak }) {

    <TweaksPanel title="De Rapporteur · Tweaks">
      <TweakSection title="Accentkleur">
        <TweakSlider label="Oranje tint" id="accentHue" value={tweaks.accentHue} min={28} max={78} step={2} onChange={v => setTweak('accentHue', v)} />
      </TweakSection>
    </TweaksPanel>
  );

/* ── App ── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = ac(tweaks.accentHue);

  /* Sync CSS custom props for shimmer + scroll bar */
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--ac-deep',  accent.deep);
    root.style.setProperty('--ac-mid',   accent.mid);
    root.style.setProperty('--ac-light', accent.light);
  }, [accent.deep, accent.mid, accent.light]);

  /* Mount scroll progress (vanilla, no re-renders) */
  useEffect(() => mountScrollProgress(), []);

  return (
    <>
      <Nav accent={accent} />
      <Hero accent={accent} />
      <Marquee accent={accent} />
      <ProofSection accent={accent} />
      <RoutesSection accent={accent} />
      <TrustSection accent={accent} />
      <CTASection accent={accent} />
      <Footer accent={accent} />
      <TweaksApp tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
